<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harlo — Your Daily Wellness Companion</title>
  <style>
    :root {
      --green: #2D5A4F;
      --cream: #FAF8F5;
      --ink: #1C1C1A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero {
      max-width: 600px;
      padding: 40px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: var(--green);
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.8;
    }
    .badge {
      background: var(--green);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      display: inline-block;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="badge">Coming Soon</div>
    <h1>Harlo</h1>
    <p>Your daily wellness companion</p>
    <p style="font-size: 1rem;">Check in with yourself every day — journal your thoughts, track your mood, and connect with a supportive community.</p>
  </div>
</body>
</html>
